<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Drone Test Project</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
        /* Скрываем стандартный футер Unity */
        #unity-footer { display: none !important; }

        /* Центрируем контейнер игры на странице */
        body { margin: 0; padding: 0; background-color: #232d36; }
        
        #unity-container { 
            position: absolute; 
            left: 50%; 
            top: 50%; 
            transform: translate(-50%, -50%); 
            overflow: visible; /* Чтобы кнопка не обрезалась */
        }

        /* Наша новая кнопка поверх канваса */
        #custom-fullscreen-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 999; /* Самый верхний слой */
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            font-weight: bold;
            display: none; /* Появится программно после загрузки */
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #custom-fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            transform: scale(1.05);
        }

        #custom-fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
        
        <!-- Кнопка добавлена внутрь контейнера -->
        <button id="custom-fullscreen-btn">Полноэкранный режим</button>

        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-warning"> </div>
    </div>

    <script>
        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var customBtn = document.querySelector("#custom-fullscreen-btn");

        function unityShowBanner(msg, type) {
            var warningBanner = document.querySelector("#unity-warning");
            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
            }
            var div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type == 'error') div.style = 'background: red; padding: 10px;';
            else {
                if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
                setTimeout(function() {
                    warningBanner.removeChild(div);
                    updateBannerVisibility();
                }, 5000);
            }
            updateBannerVisibility();
        }

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/Drone mobile.loader.js";
        var config = {
            arguments: [],
            dataUrl: buildUrl + "/Drone mobile.data",
            frameworkUrl: buildUrl + "/Drone mobile.framework.js",
            codeUrl: buildUrl + "/Drone mobile.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "Drone Test Project",
            productVersion: "0.1.0",
            showBanner: unityShowBanner,
        };

        // Настройка для мобильных или десктопа
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);
            container.className = "unity-mobile";
            canvas.className = "unity-mobile";
        } else {
            canvas.style.width = "960px";
            canvas.style.height = "600px";
        }

        loadingBar.style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then((unityInstance) => {
                loadingBar.style.display = "none";
                
                // 1. Показываем кнопку после загрузки игры
                customBtn.style.display = "block";

                // 2. Логика перехода в полный экран
                customBtn.onclick = () => {
                    unityInstance.SetFullscreen(1);
                };

                // 3. Отслеживание выхода из полноэкранного режима
                const handleFullscreenChange = () => {
                    if (!document.fullscreenElement && 
                        !document.webkitFullscreenElement && 
                        !document.mozFullScreenElement && 
                        !document.msFullscreenElement) {
                        // Если вышли из полноэкранного режима — показываем кнопку
                        customBtn.style.display = "block";
                    } else {
                        // Если вошли — скрываем кнопку
                        customBtn.style.display = "none";
                    }
                };

                document.addEventListener('fullscreenchange', handleFullscreenChange);
                document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
                document.addEventListener('mozfullscreenchange', handleFullscreenChange);
                document.addEventListener('MSFullscreenChange', handleFullscreenChange);

            }).catch((message) => {
                alert(message);
            });
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
